<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="ridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F172A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#1E293B" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="1240" height="940" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="url(#sky)"/>

  <!-- distant mountains -->
  <path d="M-30 520 L260 280 L420 420 L560 260 L760 470 L980 260 L1230 520 V920 H-30 Z" fill="url(#ridge)" opacity="0.55"/>
  <path d="M-40 560 L210 330 L420 510 L610 310 L800 560 L970 360 L1240 600 V920 H-40 Z" fill="#0F172A" opacity="0.35"/>

  <!-- foreground meadow -->
  <path d="M0 610 C220 560 420 640 610 620 C820 598 980 650 1200 610 V920 H0 Z" fill="url(#meadow)"/>

  <!-- path -->
  <path d="M530 920 C560 840 540 790 600 740 C660 690 700 660 740 610 C780 560 840 520 920 500" stroke="#E2E8F0" stroke-opacity="0.85" stroke-width="22" stroke-linecap="round"/>
  <path d="M530 920 C560 840 540 790 600 740 C660 690 700 660 740 610 C780 560 840 520 920 500" stroke="#94A3B8" stroke-opacity="0.25" stroke-width="34" stroke-linecap="round" filter="url(#soft)"/>

  <!-- tiny hiker -->
  <circle cx="760" cy="610" r="10" fill="#0F172A" opacity="0.85"/>
  <path d="M760 622 L760 670" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M760 640 L735 660" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M760 640 L790 655" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M760 670 L740 705" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M760 670 L780 705" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M728 655 L720 705" stroke="#0F172A" stroke-width="7" stroke-linecap="round" opacity="0.75"/>

</svg>

